name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Push to Hugging Face Space
      env:
        HF_TOKEN: ${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}
      run: |
        git push --force https://Ducdata1808:$HF_TOKEN@huggingface.co/spaces/Ducdata1808/AGV_simulator main
